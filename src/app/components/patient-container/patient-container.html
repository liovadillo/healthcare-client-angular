<div>
  <h2 class="title is-4 has-text-dark">Patients</h2>

  <div *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <ng-container *ngIf="patients$ | async as patients; else loading">
    <app-patient-list [patients]="patients"
    (selectedPatient)="onPatientSelected($event)">
    </app-patient-list>
  </ng-container>

  <ng-template #loading>
    Loading...
  </ng-template>

</div>
