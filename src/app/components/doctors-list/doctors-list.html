<table>
  <thead>
    <tr>      
      <th>Name</th>
      <th>Speciality</th>
      <th>IsAvailable</th>
      <th>YOE</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let doctor of doctors">    
      <td>{{ doctor.name }}</td>
      <td>{{ doctor.specialty }}</td>
      <td>{{ doctor.isAvailable }}</td>
      <td>{{ doctor.yearsOfExperience }}</td>      
    </tr>
  </tbody>
</table>
