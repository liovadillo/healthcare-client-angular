<table>
  <thead>
    <tr>      
      <th>Name</th>
      <th>Speciality</th>
      <th>IsAvailable</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let doctor of doctors" (click)="onSelect(doctor.id)">    
      <td>{{ doctor.name }}</td>
      <td>{{ doctor.specialty }}</td>
      <td>{{ doctor.isAvailable ? 'Active' : 'Inactive' }}</td>         
    </tr>
  </tbody>
</table>
