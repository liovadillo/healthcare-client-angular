<div>
  <h2 class="title is-4 has-text-dark">Appointments</h2>

  <div *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <ng-container *ngIf="appointments$ | async as appointments; else loading">
    <app-appointment-list [appointments]="appointments"
    (appointmentSelected)="onAppointmentSelected($event)">
    </app-appointment-list>
  </ng-container>

  <ng-template #loading>
    Loading...
  </ng-template>

</div>
