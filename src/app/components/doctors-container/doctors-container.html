<div>
  <h2 class="title is-4 has-text-dark">Doctors</h2>

  <div *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <ng-container *ngIf="doctors$ | async as doctors; else loading">
    <app-doctors-list [doctors]="doctors"
    (doctorSelected)="onDoctorSelected($event)">
    </app-doctors-list>
  </ng-container>

  <ng-template #loading>
    Loading...
  </ng-template>

</div>
